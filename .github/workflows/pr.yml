name: PR Checks

on:
  pull_request:
    branches:
      - main
      - feature/unity-mujoco-gym
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repo layout
        run: |
          test -d unity
          test -d rl
          test -d sim
          test -d conf
          test -d scripts
          test -d artifacts
          test -f README.md
          test -f requirements.in
          test -f requirements.txt
          test -x scripts/setup_python.sh

  python-checks:
    needs: sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pip-tools
        run: python -m pip install pip-tools

      - name: Sync dependencies
        run: pip-sync requirements.txt

      - name: Import smoke
        run: python -c "import gymnasium, mlagents_envs, hydra, omegaconf, mlflow, torch, numpy"

      - name: Check dependency integrity
        run: pip check

      - name: Run tests
        run: |
          if [ -d rl/tests ]; then
            pytest rl/tests -q
          else
            echo "rl/tests not found, skipping"
          fi